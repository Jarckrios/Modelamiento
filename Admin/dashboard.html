<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .navbar {
            background: #0d6efd;
            padding: 15px;
        }

        .navbar-brand {
            color: white;
            font-weight: bold;
            font-size: 24px;
        }

        .card-dashboard {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: .3s;
        }

        .card-dashboard:hover {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 45px;
            opacity: .9;
        }

        h2 {
            font-weight: bold;
        }
    </style>

</head>

<body>

    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand mb-0">
                <i class="bi bi-speedometer2"></i> Panel Administrativo
            </span>
        </div>
    </nav>

    <div class="container py-5">

        <div class="row g-4">

            <div class="col-lg-3 col-md-6">
                <div class="card card-dashboard text-white bg-primary">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h2>150</h2>
                            <p class="mb-0">Productos</p>
                        </div>
                        <i class="bi bi-box-seam icon"></i>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card card-dashboard text-white bg-success">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h2>75</h2>
                            <p class="mb-0">Pedidos</p>
                        </div>
                        <i class="bi bi-cart-check icon"></i>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card card-dashboard text-white bg-warning">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h2>$3500</h2>
                            <p class="mb-0">Ventas</p>
                        </div>
                        <i class="bi bi-currency-dollar icon"></i>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card card-dashboard text-white bg-danger">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h2>25</h2>
                            <p class="mb-0">Clientes</p>
                        </div>
                        <i class="bi bi-people-fill icon"></i>
                    </div>
                </div>
            </div>

        </div>

        <div class="card mt-5 shadow-sm">
            <div class="card-header bg-dark text-white">
                Resumen General
            </div>

            <div class="card-body">
                <p>Bienvenido al panel administrativo de <strong>Mi Despensa Virtual</strong>.</p>

                <ul>
                    <li>📦 Productos registrados: <strong>150</strong></li>
                    <li>🛒 Pedidos realizados: <strong>75</strong></li>
                    <li>💰 Ventas totales: <strong>$3500</strong></li>
                    <li>👥 Clientes registrados: <strong>25</strong></li>
                </ul>
            </div>
        </div>

    </div>

</body>

</html>
