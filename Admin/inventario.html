<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inventario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
        }

        .table thead {
            background-color: #198754;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f8f9fa;
        }
    </style>

</head>

<body>

    <div class="container py-5">

        <div class="card">

            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">📦 Inventario</h3>

                <button class="btn btn-light btn-sm">
                    + Agregar Producto
                </button>
            </div>

            <div class="card-body">

                <div class="row mb-3">

                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Buscar producto...">
                    </div>

                </div>

                <div class="table-responsive">

                    <table class="table table-bordered table-hover text-center align-middle">

                        <thead>

                            <tr>
                                <th>Producto</th>
                                <th>Existencia</th>
                                <th>Estado</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr>
                                <td>Leche</td>
                                <td>50</td>
                                <td><span class="badge bg-success">Disponible</span></td>
                            </tr>

                            <tr>
                                <td>Arroz</td>
                                <td>20</td>
                                <td><span class="badge bg-warning text-dark">Stock Bajo</span></td>
                            </tr>

                            <tr>
                                <td>Azúcar</td>
                                <td>0</td>
                                <td><span class="badge bg-danger">Agotado</span></td>
                            </tr>

                            <tr>
                                <td>Aceite</td>
                                <td>65</td>
                                <td><span class="badge bg-success">Disponible</span></td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

            <div class="card-footer d-flex justify-content-between">

                <strong>Total de productos: 4</strong>

                <strong>Productos disponibles: 2</strong>

            </div>

        </div>

    </div>

</body>

</html>
