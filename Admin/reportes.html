<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reportes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card-report {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card-report:hover {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 40px;
            opacity: 0.8;
        }

        .title {
            font-size: 14px;
            color: #6c757d;
        }
    </style>

</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">📊 Reportes</h2>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card card-report text-white bg-primary">

                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>
                        <h3>$5200</h3>
                        <div class="title">Ventas del Mes</div>
                    </div>

                    <i class="bi bi-cash-stack icon"></i>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card card-report text-white bg-success">

                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>
                        <h3>150</h3>
                        <div class="title">Pedidos</div>
                    </div>

                    <i class="bi bi-cart-check icon"></i>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card card-report text-white bg-warning">

                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>
                        <h3>90</h3>
                        <div class="title">Clientes</div>
                    </div>

                    <i class="bi bi-people-fill icon"></i>

                </div>

            </div>

        </div>

    </div>

    <div class="card mt-5 shadow-sm border-0 rounded-3">

        <div class="card-body">

            <h5>📈 Resumen general</h5>

            <p class="text-muted">
                Este panel muestra un resumen de ventas, pedidos y clientes del sistema.
            </p>

            <ul>
                <li>💰 Incremento de ventas en el mes actual</li>
                <li>🛒 Pedidos procesados correctamente</li>
                <li>👥 Crecimiento de clientes activos</li>
            </ul>

        </div>

    </div>

</div>

</body>

</html>
